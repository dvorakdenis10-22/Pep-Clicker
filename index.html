<!DOCTYPE html>
<html lang="cs">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pep Clicker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->

<div id="loginBox">

<h1>Pep Clicker Login</h1>

<input id="username" placeholder="Jméno">
<br><br>

<input id="password" type="password" placeholder="Heslo">
<br><br>

<button onclick="login()">
Hrát
</button>

</div>

<!-- GAME -->

<div id="game">

<!-- COINS -->

<div class="coinsBox">

<h1>Pep Coins</h1>

<div id="coins">0</div>

<div id="stats">
Výdělek za sekundu: 0
</div>

</div>

<!-- KŮŇ -->

<div class="horseArea">

<button id="horseBtn">
🐎
</button>

</div>

<!-- OBCHOD -->

<div class="shopBox">

<h2>Obchod u Ládycha</h2>

<div class="shopPanel">

<button onclick="buyUpgrade('horse')">
🐴 Kůň
<br>
+1/sec
<br>
Cena:
<span id="horsePrice">50</span>
</button>

<button onclick="buyUpgrade('stable')">
🏠 Stáj
<br>
+5/sec
<br>
Cena:
<span id="stablePrice">200</span>
</button>

<button onclick="buyUpgrade('farm')">
🌾 Farma
<br>
+20/sec
<br>
Cena:
<span id="farmPrice">1000</span>
</button>

<button onclick="buyUpgrade('workshop')">
🔧 Ládychova dílna
<br>
+25 000/sec
<br>
Cena:
<span id="workshopPrice">5000000</span>
</button>

<button onclick="buyUpgrade('garage')">
🚗 Garáž u Kotlise
<br>
+125 000/sec
<br>
Cena:
<span id="garagePrice">25000000</span>
</button>

<button onclick="buyUpgrade('pedigree')">
📜 Rodokmeny
<br>
+500 000/sec
<br>
Cena:
<span id="pedigreePrice">100000000</span>
</button>

</div>

</div>

<!-- KOTLISOVI SPECIALITY -->

<div class="specialBox">

<h2>Kotlisovi speciality</h2>

<div class="specialPanel">

<button onclick="buyDoubleCoins()">
✨ 2x Pep Coins (30 sec)
<br>
Cena: 40 000
</button>

<button onclick="buyTicket()">
🎟 Ticket do točky
<br>
Cena: 250 000
</button>

<button onclick="slotMachine()">
🎰 Automaty
</button>

<button onclick="buyUFO()">
🛸 UFO RESET
<br>
Cena: 10 000 000 000
</button>

</div>

</div>

<!-- PEP BUTTON -->

<button id="pepBtn">
PEP
</button>

<!-- AUDIO -->

<audio id="horseSound">
<source src="horse.mp3" type="audio/mpeg">
</audio>

</div>

<script src="script.js"></script>

</body>
</html>
