<!DOCTYPE html>
<html lang="cs">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pep Clicker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->

<div id="loginBox">

<h1>Pep Clicker Login</h1>

<input id="username" placeholder="Jméno">
<br><br>

<input id="password" type="password" placeholder="Heslo">
<br><br>

<button onclick="login()">Hrát</button>

</div>

<!-- GAME -->

<div id="game" style="display:none;">

<!-- COINS -->

<div class="coinsBox">

<h1>Pep Coins</h1>

<div id="coins">0</div>

</div>

<!-- MAIN -->

<div class="mainContainer">

<!-- LEFT -->

<div class="leftSide">

<div class="stable">

<button id="horseBtn">
🐎
</button>

</div>

</div>

<!-- LINE -->

<div class="middleLine"></div>

<!-- RIGHT -->

<div class="rightSide">

<h2>Obchod u Ládycha</h2>

<div class="shopPanel">

<!-- STATS -->

<div id="stats">
Výdělek za sekundu: 0
</div>

<!-- UPGRADES -->

<button onclick="buyUpgrade('horse')">
🐴 Kůň
<br>
+1/sec
<br>
Cena:
<span id="horsePrice">50</span>
</button>

<button onclick="buyUpgrade('stable')">
🏠 Stáj
<br>
+5/sec
<br>
Cena:
<span id="stablePrice">200</span>
</button>

<button onclick="buyUpgrade('farm')">
🌾 Farma
<br>
+20/sec
<br>
Cena:
<span id="farmPrice">1000</span>
</button>

<button onclick="buyUpgrade('workshop')">
🔧 Ládychova dílna
<br>
+25 000/sec
<br>
Cena:
<span id="workshopPrice">5000000</span>
</button>

<button onclick="buyUpgrade('garage')">
🚗 Garáž u Kotlise
<br>
+125 000/sec
<br>
Cena:
<span id="garagePrice">25000000</span>
</button>

<button onclick="buyUpgrade('pedigree')">
📜 Rodokmeny
<br>
+500 000/sec
<br>
Cena:
<span id="pedigreePrice">100000000</span>
</button>

<!-- ENCHANT -->

<button onclick="buyDoubleCoins()">
✨ 2x Pep Coins (30 sec)
<br>
Cena: 40 000
</button>

<!-- TICKET -->

<button onclick="buyTicket()">
🎟 Ticket do točky
<br>
Cena: 250 000
</button>

<!-- SLOT -->

<button onclick="slotMachine()">
🎰 Automaty
<br>
Max vklad: 30M
</button>

<!-- UFO -->

<button onclick="buyUFO()">
🛸 UFO RESET
<br>
Cena: 10 000 000 000
</button>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
