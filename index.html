<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pep Clicker 2.0</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- LOGIN -->
<div id="loginBox">
<h1>Pep Clicker 2.0</h1>
<input id="username" placeholder="Jméno">
<br><br>
<input id="password" type="password" placeholder="Heslo">
<br><br>
<button onclick="login()">
Hrát
</button>
</div>
<!-- GAME -->
<div id="game">
<!-- TOP -->
<div class="topBar">
<div class="coinsArea">
<h1>Pep Coins</h1>
<div id="coins">0</div>
<div id="stats">
Výdělek za sekundu: 0
</div>
</div>
<div class="prestigeBox">
<h2>🔥 Prestige </h2>
<div id="prestigeLevel">
Level: 0
</div>
<button onclick="prestige()">
RESET + BOOST
</button>
</div>
</div>
<!-- MAIN -->
<div class="mainArea">
<!-- HORSE -->
<div class="horseContainer">
<button id="horseBtn">
🐎
</button>
<div id="horseRarity">
Common Horse
</div>
<button id="pepBtn">
PEP
</button>
</div>
<!-- SHOP -->
<div class="shopContainer">
<h2>Obchod u Ládycha</h2>
<div class="shopPanel">
<button onclick="buyUpgrade('horse')">
🐴 Kůň
<br>
+1/sec
<br>
<span id="horsePrice">50</span>
</button>
<button onclick="buyUpgrade('stable')">
🏠 Stáj
<br>
+5/sec
<br>
<span id="stablePrice">200</span>
</button>
<button onclick="buyUpgrade('farm')">
🌾 Sláma
<br>
+20/sec
<br>
<span id="farmPrice">1 000</span>
</button>
<button onclick="buyUpgrade('workshop')">
🔧 Ládychova dílna
<br>
+25K/sec
<br>
<span id="workshopPrice">5M</span>
</button>
<button onclick="buyUpgrade('garage')">
🚗 Garáž u Kotlise
<br>
+125K/sec
<br>
<span id="garagePrice">25M</span>
</button>
<button onclick="buyUpgrade('rodokmeny')">
📜 Rodokmeny
<br>
+500K/sec
<br>
<span id="rodokmenPrice">100M</span>
</button>
</div>
</div>
<!-- SPECIAL -->
<div class="specialContainer">
<h2>Kotlisovy speciality</h2>
<div class="specialPanel">
<button onclick="buyDoubleCoins()">
✨ 2x Pep Coins
</button>
<button onclick="buyTicket()">
🎟 Ticket
</button>
<button onclick="slotMachine()">
🎰 Automaty
</button>
<button onclick="openLootbox()">
🥚 Lootbox
<br>
500K
</button>
</div>
<!-- UFO PRESTIGE SHOP -->
<div class="ufoPrestigeShop">
<h2>🛸 Prestige Shop</h2>
<button id="ufoPrestigeBtn" onclick="buyUFOPrestige()">
🛸 UFO Prestige
<br>
<span class="ufoSub">+1 Prestige levelů</span>
<br>
<span class="ufoPrice">10 000 000 000</span>
</button>
</div>
</div>
</div>
<!-- ACHIEVEMENTS -->
<div class="achievementBox">
<h2>🏆 Achievementy</h2>
<div id="achievementList">
</div>
</div>
<!-- AUDIO -->
<audio id="horseSound">
<source src="horse.mp3" type="audio/mpeg">
</audio>
</div>
<script src="script.js"></script>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAosUfOirXSOLSRTKFIOPpbfQX05G4TL3o",
authDomain: "pep-clicker.firebaseapp.com",
projectId: "pep-clicker",
storageBucket: "pep-clicker.firebasestorage.app",
messagingSenderId: "59444977629",
appId: "1:59444977629:web:6488b64792ab6f42e8a034"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";

/* 🔐 LOGIN */
window.login = async function () {
const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

if (!username || !password) return;

currentUser = username + "_" + password;

document.getElementById("loginBox").style.display = "none";
document.getElementById("game").style.display = "block";

loadGame();
};

/* 💾 SAVE */
window.saveGame = async function () {
if (!currentUser) return;

await setDoc(doc(db, "players", currentUser), {
coins,
perSec,
prestigeLevel,
upgrades
});
};

/* 📥 LOAD */
async function loadGame() {
const snap = await getDoc(doc(db, "players", currentUser));

if (snap.exists()) {
const data = snap.data();

coins = data.coins || 0;
perSec = data.perSec || 0;
prestigeLevel = data.prestigeLevel || 0;

if (data.upgrades) {
Object.assign(upgrades, data.upgrades);
}

renderPrices();
update();
}
}

/* 🔄 AUTO SAVE */
setInterval(() => {
if (currentUser) saveGame();
}, 5000);

</script>
</body>
</html>
