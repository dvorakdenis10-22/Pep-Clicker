<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pep Clicker 2.0</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h1>Pep Clicker 2.0</h1>

<input id="username" placeholder="Jméno">
<br><br>

<input id="password" type="password" placeholder="Heslo">
<br><br>

<button onclick="login()">Hrát</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

<!-- TOP -->
<div class="topBar">
<div class="coinsArea">
<h1>Pep Coins</h1>
<div id="coins">0</div>
<div id="stats">Výdělek za sekundu: 0</div>
</div>

<div class="prestigeBox">
<h2>🔥 Prestige</h2>
<div id="prestigeLevel">Level: 0</div>
<button onclick="prestige()">RESET + BOOST</button>
</div>
</div>

<!-- MAIN -->
<div class="mainArea">

<!-- HORSE -->
<div class="horseContainer">
<button id="horseBtn">🐎</button>

<div id="horseRarity">Common Horse</div>

<button id="pepBtn">PEP</button>
</div>

<!-- SHOP -->
<div class="shopContainer">
<h2>Obchod u Ládycha</h2>

<div class="shopPanel">
<button onclick="buyUpgrade('horse')">
🐴 Kůň<br>+1/sec<br><span id="horsePrice">50</span>
</button>

<button onclick="buyUpgrade('stable')">
🏠 Stáj<br>+5/sec<br><span id="stablePrice">200</span>
</button>

<button onclick="buyUpgrade('farm')">
🌾 Sláma<br>+20/sec<br><span id="farmPrice">1 000</span>
</button>

<button onclick="buyUpgrade('workshop')">
🔧 Dílna<br>+25K/sec<br><span id="workshopPrice">5M</span>
</button>

<button onclick="buyUpgrade('garage')">
🚗 Garáž<br>+125K/sec<br><span id="garagePrice">25M</span>
</button>

<button onclick="buyUpgrade('rodokmeny')">
📜 Rodokmeny<br>+500K/sec<br><span id="rodokmenPrice">100M</span>
</button>
</div>
</div>

<!-- SPECIAL -->
<div class="specialContainer">

<h2>Kotlisovy speciality</h2>

<div class="specialPanel">
<button onclick="buyDoubleCoins()">✨ 2x Coins</button>
<button onclick="buyTicket()">🎟 Ticket</button>
<button onclick="slotMachine()">🎰 Automaty</button>
<button onclick="openLootbox()">🥚 Lootbox</button>
</div>

<div class="ufoPrestigeShop">
<h2>🛸 Prestige Shop</h2>

<button id="ufoPrestigeBtn" onclick="buyUFOPrestige()">
🛸 UFO Prestige<br>
+1 level<br>
<span id="ufoPrestigePrice">10B</span>
</button>

</div>

</div>

<!-- ACHIEVEMENTS -->
<div class="achievementBox">
<h2>🏆 Achievementy</h2>
<div id="achievementList"></div>
</div>

</div>

<!-- AUDIO -->
<audio id="horseSound">
<source src="horse.mp3" type="audio/mpeg">
</audio>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
